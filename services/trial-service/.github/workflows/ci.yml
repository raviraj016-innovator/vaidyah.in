name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  SERVICE_NAME: trial-service
  SERVICE_PORT: 8003

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vaidyah_test
          POSTGRES_USER: vaidyah
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaidyah"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AWS_REGION: ap-south-1
      AWS_DEFAULT_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      DATABASE_URL: postgresql://vaidyah:test_password@localhost:5432/vaidyah_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      - run: pytest --cov=app --cov-report=xml -v
      - run: pip install pip-audit && pip-audit -r requirements.txt --strict || true

  deploy:
    name: Build & Deploy
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/vaidyah/${{ env.SERVICE_NAME }}:${{ env.DEPLOY_ENV }}-${{ github.sha }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/vaidyah/${{ env.SERVICE_NAME }}:${{ env.DEPLOY_ENV }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name vaidyah-${DEPLOY_ENV} --region ${{ env.AWS_REGION }}
          kubectl set image deployment/${{ env.SERVICE_NAME }} ${{ env.SERVICE_NAME }}="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/vaidyah/${{ env.SERVICE_NAME }}:${DEPLOY_ENV}-${{ github.sha }}" -n vaidyah
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n vaidyah --timeout=300s
