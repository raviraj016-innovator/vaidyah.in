###############################################################################
# Vaidyah Platform - Network Policies
#
# Implements zero-trust network segmentation:
#   1. Default deny all ingress in the namespace
#   2. api-gateway accepts traffic from the ALB / Ingress controller
#   3. Internal services only accept traffic from api-gateway
#   4. All services can reach data stores (PostgreSQL, Redis, OpenSearch)
#   5. All services can reach DNS for service discovery
#
# Prerequisites:
#   - A CNI plugin that supports NetworkPolicy (e.g., Calico, Cilium)
#   - AWS VPC CNI with network policy support enabled on EKS
###############################################################################

###############################################################################
# 1. Default Deny All Ingress
# Block all inbound traffic to pods in the vaidyah namespace by default.
###############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: vaidyah
  labels:
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
###############################################################################
# 1b. Default Deny All Egress
# Block all outbound traffic from pods by default. Explicit egress rules below
# whitelist required destinations (data stores, DNS, AWS services).
###############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: vaidyah
  labels:
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
###############################################################################
# 2. API Gateway Ingress
# Allow the api-gateway to receive traffic from:
#   - The AWS ALB Ingress controller namespace
#   - Prometheus / monitoring namespace (for scraping)
###############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-ingress
  namespace: vaidyah
  labels:
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from the ALB Ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: aws-load-balancer-controller
      ports:
        - protocol: TCP
          port: 3000
    # Allow traffic from any source on the ALB target port
    # (needed because ALB health checks originate from the VPC CIDR)
    - ports:
        - protocol: TCP
          port: 3000
      from:
        - ipBlock:
            cidr: 10.0.0.0/16
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3000

---
###############################################################################
# 3. Internal Services Ingress - Clinical Service
# Only accept traffic from api-gateway and other vaidyah services.
###############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-clinical-service-ingress
  namespace: vaidyah
  labels:
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: clinical-service
  policyTypes:
    - Ingress
  ingress:
    # Allow from api-gateway
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 3001
    # Allow from other internal vaidyah services
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: vaidyah
              vaidyah.health/tier: internal
      ports:
        - protocol: TCP
          port: 3001
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3001

---
###############################################################################
# 4. Internal Services Ingress - Integration Service
###############################################################################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-integration-service-ingress
  namespace: vaidyah
  labels:
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: integration-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 3002
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: vaidyah
              vaidyah.health/tier: internal
      ports:
        - protocol: TCP
          port: 3002
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3002

---
###############################################################################
# 5. Internal Services Ingress - Voice Service
###############################################################################
