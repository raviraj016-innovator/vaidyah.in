###############################################################################
# Vaidyah Platform - NLU Service
# Internal service for Natural Language Understanding (Python/FastAPI, port 8002)
# Handles intent classification, entity extraction, medical NER, and
# clinical text analysis. Higher memory for ML model inference.
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlu-service
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: nlu-service
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: ai
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: nlu-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nlu-service
        app.kubernetes.io/part-of: vaidyah
        app.kubernetes.io/component: ai
        vaidyah.health/tier: internal
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: vaidyah-service-account
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - nlu-service
                topologyKey: kubernetes.io/hostname
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - nlu-service
                topologyKey: topology.kubernetes.io/zone
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: nlu-service
      containers:
        - name: nlu-service
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/vaidyah/nlu-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vaidyah-config
            - secretRef:
                name: vaidyah-secrets
          env:
            - name: SERVICE_NAME
              value: nlu-service
            - name: PORT
              value: "8002"
            - name: UVICORN_WORKERS
              value: "2"
            - name: MODEL_CACHE_DIR
              value: /var/lib/nlu/models
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /home/appuser/.cache
            - name: model-cache
              mountPath: /var/lib/nlu/models
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 200Mi
        - name: cache
          emptyDir:
            sizeLimit: 500Mi
        - name: model-cache
          emptyDir:
            sizeLimit: 1Gi
---
###############################################################################
# Service
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: nlu-service
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: nlu-service
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nlu-service
  ports:
    - name: http
      port: 8002
      targetPort: http
      protocol: TCP
---
###############################################################################
# Horizontal Pod Autoscaler
###############################################################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nlu-service-hpa
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: nlu-service
    app.kubernetes.io/part-of: vaidyah
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nlu-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
###############################################################################
# Pod Disruption Budget
###############################################################################
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nlu-service-pdb
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: nlu-service
    app.kubernetes.io/part-of: vaidyah
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nlu-service
