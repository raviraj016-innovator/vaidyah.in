###############################################################################
# Vaidyah Platform - AWS ALB Ingress
# Configures AWS Application Load Balancer via the AWS Load Balancer Controller
# with TLS termination, path-based routing, WebSocket support, WAF, and
# health check tuning.
#
# Prerequisites:
#   - AWS Load Balancer Controller installed in the cluster
#   - ACM certificate provisioned for api.vaidyah.health
#   - AWS WAF WebACL created and ARN available
#   - Route53 hosted zone for vaidyah.health
###############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vaidyah-ingress
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: vaidyah-ingress
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: networking
  annotations:
    # ---------------------------------------------------------------------------
    # ALB Controller Core Configuration
    # ---------------------------------------------------------------------------
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ip-address-type: dualstack

    # ---------------------------------------------------------------------------
    # TLS / HTTPS Configuration
    # Replace placeholders before applying:
    #   export ACM_CERTIFICATE_ARN=$(terraform -chdir=infra/terraform output -raw acm_certificate_arn)
    #   envsubst < ingress.yml | kubectl apply -f -
    # ---------------------------------------------------------------------------
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: "${ACM_CERTIFICATE_ARN}"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/ssl-redirect: "443"

    # ---------------------------------------------------------------------------
    # Health Check Configuration
    # ---------------------------------------------------------------------------
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/success-codes: "200"

    # ---------------------------------------------------------------------------
    # WAF Integration
    # Replace <WAF_WEB_ACL_ARN> with your AWS WAF WebACL ARN.
    # ---------------------------------------------------------------------------
    alb.ingress.kubernetes.io/wafv2-acl-arn: "${WAF_WEB_ACL_ARN}"

    # ---------------------------------------------------------------------------
    # Load Balancer Attributes
    # ---------------------------------------------------------------------------
    alb.ingress.kubernetes.io/load-balancer-attributes: >-
      idle_timeout.timeout_seconds=120,
      routing.http.drop_invalid_header_fields.enabled=true,
      routing.http2.enabled=true,
      deletion_protection.enabled=true,
      access_logs.s3.enabled=true,
      access_logs.s3.bucket=vaidyah-alb-access-logs,
      access_logs.s3.prefix=vaidyah-prod

    # ---------------------------------------------------------------------------
    # Target Group Attributes
    # ---------------------------------------------------------------------------
    alb.ingress.kubernetes.io/target-group-attributes: >-
      deregistration_delay.timeout_seconds=30,
      stickiness.enabled=false,
      load_balancing.algorithm.type=least_outstanding_requests

    # ---------------------------------------------------------------------------
    # Tags for cost allocation and identification
    # ---------------------------------------------------------------------------
    alb.ingress.kubernetes.io/tags: >-
      Environment=production,
      Application=vaidyah,
      Team=vaidyah-platform,
      ManagedBy=kubernetes

    # ---------------------------------------------------------------------------
    # Security Group Configuration
    # ---------------------------------------------------------------------------
    alb.ingress.kubernetes.io/security-groups: "${ALB_SECURITY_GROUP_ID}"
    alb.ingress.kubernetes.io/manage-backend-security-group-rules: "true"

    # ---------------------------------------------------------------------------
    # External DNS (if using external-dns controller)
    # ---------------------------------------------------------------------------
    external-dns.alpha.kubernetes.io/hostname: api.vaidyah.health
spec:
  ingressClassName: alb
  rules:
    - host: api.vaidyah.health
      http:
        paths:
          # -----------------------------------------------------------------
          # REST API traffic -> api-gateway
          # -----------------------------------------------------------------
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          # -----------------------------------------------------------------
          # WebSocket traffic -> api-gateway
          # WebSocket connections are upgraded at the ALB via the idle timeout
          # and stickiness settings configured above.
          # -----------------------------------------------------------------
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          # -----------------------------------------------------------------
          # Health check endpoint (for external monitoring tools)
          # -----------------------------------------------------------------
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
---
###############################################################################
# Ingress - HTTP to HTTPS Redirect
# Catches all HTTP (port 80) traffic and redirects to HTTPS.
###############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vaidyah-ingress-http-redirect
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: vaidyah-ingress-http-redirect
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: networking
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: >-
      {"Type":"redirect","RedirectConfig":{"Protocol":"HTTPS","Port":"443","StatusCode":"HTTP_301"}}
spec:
  ingressClassName: alb
  rules:
    - host: api.vaidyah.health
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
