###############################################################################
# Vaidyah Platform - Shared ConfigMap
# Non-sensitive configuration shared across all services.
# Service-specific overrides can be done via per-service ConfigMaps or
# environment variables in the Deployment spec.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: vaidyah-config
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: vaidyah-config
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: configuration
data:
  # ---------------------------------------------------------------------------
  # General Environment
  # ---------------------------------------------------------------------------
  NODE_ENV: production
  PYTHON_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  TZ: UTC

  # ---------------------------------------------------------------------------
  # AWS Configuration
  # ---------------------------------------------------------------------------
  AWS_REGION: ap-south-1
  AWS_DEFAULT_REGION: ap-south-1

  # ---------------------------------------------------------------------------
  # Inter-Service Communication URLs
  # All services communicate over ClusterIP within the vaidyah namespace.
  # ---------------------------------------------------------------------------
  API_GATEWAY_URL: http://api-gateway.vaidyah.svc.cluster.local:3000
  CLINICAL_SERVICE_URL: http://clinical-service.vaidyah.svc.cluster.local:3001
  INTEGRATION_SERVICE_URL: http://integration-service.vaidyah.svc.cluster.local:3002
  VOICE_SERVICE_URL: http://voice-service.vaidyah.svc.cluster.local:8001
  NLU_SERVICE_URL: http://nlu-service.vaidyah.svc.cluster.local:8002
  TRIAL_SERVICE_URL: http://trial-service.vaidyah.svc.cluster.local:8003

  # ---------------------------------------------------------------------------
  # OpenSearch Configuration
  # IMPORTANT: Replace placeholder with actual OpenSearch domain endpoint
  # from Terraform output: terraform output opensearch_endpoint
  # ---------------------------------------------------------------------------
  # IMPORTANT: Replace with actual endpoint before applying.
  # Run: export OPENSEARCH_ENDPOINT=$(terraform -chdir=infra/terraform output -raw opensearch_endpoint)
  #      envsubst < configmap.yml | kubectl apply -f -
  OPENSEARCH_ENDPOINT: "${OPENSEARCH_ENDPOINT}"
  OPENSEARCH_PORT: "443"
  OPENSEARCH_PROTOCOL: https

  # ---------------------------------------------------------------------------
  # DynamoDB Configuration
  # ---------------------------------------------------------------------------
  DYNAMODB_TABLE_PREFIX: vaidyah-${ENVIRONMENT}
  DYNAMODB_REGION: ap-south-1

  # ---------------------------------------------------------------------------
  # Redis / ElastiCache Configuration
  # ---------------------------------------------------------------------------
  REDIS_PORT: "6379"
  REDIS_TLS_ENABLED: "true"
  REDIS_CLUSTER_MODE: "true"

  # ---------------------------------------------------------------------------
  # Cognito Configuration (non-secret values)
  # ---------------------------------------------------------------------------
  COGNITO_REGION: ap-south-1

  # ---------------------------------------------------------------------------
  # CORS Configuration
  # ---------------------------------------------------------------------------
  CORS_ALLOWED_ORIGINS: https://app.vaidyah.health,https://admin.vaidyah.health
  CORS_ALLOWED_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
  CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-ID,X-Correlation-ID

  # ---------------------------------------------------------------------------
  # Rate Limiting
  # ---------------------------------------------------------------------------
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"

  # ---------------------------------------------------------------------------
  # Request Configuration
  # ---------------------------------------------------------------------------
  REQUEST_TIMEOUT_MS: "30000"
  MAX_REQUEST_BODY_SIZE: 10mb

  # ---------------------------------------------------------------------------
  # Feature Flags
  # ---------------------------------------------------------------------------
  ENABLE_WEBSOCKET: "true"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring.svc.cluster.local:4317
  OTEL_SERVICE_NAMESPACE: vaidyah
