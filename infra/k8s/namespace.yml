###############################################################################
# Vaidyah Platform - Namespace
# Defines the vaidyah namespace with labels for organization, monitoring,
# and network policy enforcement.
###############################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: vaidyah
  labels:
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/managed-by: kubectl
    environment: production
    team: vaidyah-platform
    # Pod Security Standards — enforce restricted baseline
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    # Enable Istio sidecar injection if service mesh is used
    # istio-injection: enabled
---
###############################################################################
# Resource Quota - Enforce cluster-level resource limits for the namespace
###############################################################################
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vaidyah-resource-quota
  namespace: vaidyah
  labels:
    app.kubernetes.io/part-of: vaidyah
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "80"
    services: "20"
    persistentvolumeclaims: "10"
---
###############################################################################
# Limit Range - Default resource constraints for pods in the namespace
###############################################################################
apiVersion: v1
kind: LimitRange
metadata:
  name: vaidyah-limit-range
  namespace: vaidyah
  labels:
    app.kubernetes.io/part-of: vaidyah
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi
