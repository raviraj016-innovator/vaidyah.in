###############################################################################
# Vaidyah Platform - Admin Portal
# Static web app served by Nginx (port 8080)
# Healthcare admin dashboard for managing centers, users, analytics.
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-portal
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: admin-portal
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-portal
        app.kubernetes.io/part-of: vaidyah
        app.kubernetes.io/component: frontend
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: vaidyah-service-account
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin-portal
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/vaidyah/admin-portal:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: admin-portal
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 50Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 5Mi
---
###############################################################################
# Service - ClusterIP for internal routing and ALB target
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: admin-portal
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: admin-portal
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: admin-portal
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
###############################################################################
# Horizontal Pod Autoscaler
###############################################################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: admin-portal-hpa
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: admin-portal
    app.kubernetes.io/part-of: vaidyah
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: admin-portal
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
###############################################################################
# Pod Disruption Budget
###############################################################################
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-portal-pdb
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: admin-portal
    app.kubernetes.io/part-of: vaidyah
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-portal
