###############################################################################
# Vaidyah Platform - ServiceAccount
# Used by all service Deployments for IRSA (IAM Roles for Service Accounts)
# to securely access AWS resources (S3, DynamoDB, Cognito, etc.) without
# embedding credentials.
###############################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vaidyah-service-account
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: vaidyah-service-account
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # The IAM role ARN is injected by the CD pipeline or Terraform output.
    # Replace with actual role ARN after infrastructure provisioning.
    eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/vaidyah-${ENVIRONMENT}-service-role
