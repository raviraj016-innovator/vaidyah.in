###############################################################################
# Vaidyah Platform - Secrets (External Secrets Operator)
#
# IMPORTANT: This file contains ${ENVIRONMENT} variable references and must
# be processed through envsubst before applying to the cluster:
#
#   export ENVIRONMENT=dev  # or staging, prod
#   envsubst < secrets.yml | kubectl apply -f -
#
# Syncs secrets from AWS Secrets Manager into the Kubernetes cluster.
#
# Prerequisites:
#   1. External Secrets Operator installed (helm install external-secrets ...)
#   2. ClusterSecretStore 'aws-secrets-manager' configured for ap-south-1
#   3. Secret 'vaidyah/<env>/app-secrets' created in AWS Secrets Manager
#      with keys: DATABASE_URL, REDIS_URL, JWT_SECRET, COGNITO_USER_POOL_ID,
#      COGNITO_CLIENT_ID, COGNITO_CLIENT_SECRET, OPENSEARCH_USERNAME,
#      OPENSEARCH_PASSWORD, ENCRYPTION_KEY, OPENAI_API_KEY
#
# For local/dev without ESO, use secrets.yml.template after replacing the
# placeholder base64 values:
#   echo -n 'your-value' | base64
#   kubectl apply -f secrets.yml.template
###############################################################################
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaidyah-secrets
  namespace: vaidyah
  labels:
    app.kubernetes.io/name: vaidyah-secrets
    app.kubernetes.io/part-of: vaidyah
    app.kubernetes.io/component: configuration
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: vaidyah-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: REDIS_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: JWT_SECRET
    - secretKey: COGNITO_USER_POOL_ID
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: COGNITO_USER_POOL_ID
    - secretKey: COGNITO_CLIENT_ID
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: COGNITO_CLIENT_ID
    - secretKey: COGNITO_CLIENT_SECRET
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: COGNITO_CLIENT_SECRET
    - secretKey: OPENSEARCH_USERNAME
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: OPENSEARCH_USERNAME
    - secretKey: OPENSEARCH_PASSWORD
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: OPENSEARCH_PASSWORD
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: ENCRYPTION_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: vaidyah/${ENVIRONMENT}/app-secrets
        property: OPENAI_API_KEY
