name: CD

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      services:
        description: "Services to deploy (comma-separated, or 'all')"
        required: false
        default: all
        type: string

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        env:
          INPUT_ENV: ${{ github.event.inputs.environment }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ ! "$INPUT_ENV" =~ ^(dev|staging|prod)$ ]]; then
              echo "::error::Invalid environment"
              exit 1
            fi
            echo "environment=${INPUT_ENV}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      clinical-service: ${{ steps.filter.outputs.clinical-service }}
      integration-service: ${{ steps.filter.outputs.integration-service }}
      voice-service: ${{ steps.filter.outputs.voice-service }}
      nlu-service: ${{ steps.filter.outputs.nlu-service }}
      trial-service: ${{ steps.filter.outputs.trial-service }}
      telemedicine-service: ${{ steps.filter.outputs.telemedicine-service }}
      web-app: ${{ steps.filter.outputs.web-app }}
      services-matrix: ${{ steps.matrix.outputs.matrix }}
      has-changes: ${{ steps.matrix.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
              - 'packages/shared-types/**'
            clinical-service:
              - 'services/clinical-service/**'
              - 'packages/shared-types/**'
              - 'packages/medical-ontology/**'
            integration-service:
              - 'services/integration-service/**'
              - 'packages/shared-types/**'
            voice-service:
              - 'services/voice-service/**'
            nlu-service:
              - 'services/nlu-service/**'
            trial-service:
              - 'services/trial-service/**'
              - 'packages/medical-ontology/**'
            telemedicine-service:
              - 'services/telemedicine-service/**'
            web-app:
              - 'apps/web/**'
              - 'packages/shared-types/**'

      - id: matrix
        run: |
          SERVICES=()
          MANUAL_SERVICES="${{ github.event.inputs.services }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "$MANUAL_SERVICES" == "all" ]]; then
            SERVICES=("api-gateway" "clinical-service" "integration-service" "voice-service" "nlu-service" "trial-service" "telemedicine-service")
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "$MANUAL_SERVICES" ]]; then
            IFS=',' read -ra SERVICES <<< "$MANUAL_SERVICES"
          else
            for svc in api-gateway clinical-service integration-service voice-service nlu-service trial-service telemedicine-service; do
              if [[ "${{ steps.filter.outputs[format('{0}', svc)] }}" == "true" ]]; then
                SERVICES+=("$svc")
              fi
            done
          fi

          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"service\":[]}" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -sc '{service: .}')
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build ${{ matrix.service }}
    needs: [resolve-env, detect-changes]
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.services-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Resolve build context
        id: ctx
        run: |
          SVC="${{ matrix.service }}"
          echo "path=services/$SVC" >> "$GITHUB_OUTPUT"
          echo "repo=vaidyah/$SVC" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ steps.ctx.outputs.repo }}
          tags: |
            type=sha,prefix=${{ needs.resolve-env.outputs.environment }}-
            type=raw,value=${{ needs.resolve-env.outputs.environment }}-latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

  deploy:
    name: Deploy to EC2 (${{ needs.resolve-env.outputs.environment }})
    needs: [resolve-env, detect-changes, build-and-push]
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-env.outputs.environment == 'prod' && 'production' || needs.resolve-env.outputs.environment }}
    env:
      DEPLOY_ENV: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify prod deploy source
        if: env.DEPLOY_ENV == 'prod'
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Production deployments only allowed from main branch"
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            # Pull updated images
            SERVICES_JSON='${{ needs.detect-changes.outputs.services-matrix }}'
            SERVICES=$(echo "$SERVICES_JSON" | jq -r '.service[]')

            for svc in $SERVICES; do
              IMAGE="${{ env.ECR_REGISTRY }}/vaidyah/$svc:${{ env.DEPLOY_ENV }}-latest"
              echo "Pulling $IMAGE..."
              docker pull "$IMAGE"
            done

            # Restart services via standalone prod compose
            cd /opt/vaidyah
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Deployment complete"

  smoke-test:
    name: Smoke Test (${{ needs.resolve-env.outputs.environment }})
    needs: [resolve-env, detect-changes, deploy]
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - name: Health checks
        run: |
          EC2_HOST="${{ secrets.EC2_HOST }}"
          SERVICES_JSON='${{ needs.detect-changes.outputs.services-matrix }}'
          SERVICES=$(echo "$SERVICES_JSON" | jq -r '.service[]')
          FAILED=0

          declare -A PORT_MAP
          PORT_MAP[api-gateway]=3000
          PORT_MAP[clinical-service]=3001
          PORT_MAP[integration-service]=3002
          PORT_MAP[voice-service]=8001
          PORT_MAP[nlu-service]=8002
          PORT_MAP[trial-service]=8003
          PORT_MAP[telemedicine-service]=8004

          # Health check via API gateway (all services are internal)
          echo "Checking API gateway health..."
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            if curl -sf --max-time 10 "http://${EC2_HOST}:3000/health" > /dev/null 2>&1; then
              echo "  API gateway: healthy"
              break
            fi
            echo "  Attempt $i/$RETRIES failed, retrying in 10s..."
            sleep 10
          done

          if ! curl -sf --max-time 10 "http://${EC2_HOST}:3000/health" > /dev/null 2>&1; then
            echo "::error::API gateway health check failed"
            exit 1
          fi

          echo "All health checks passed"

  deploy-web:
    name: Deploy Web App to Vercel
    needs: [resolve-env, detect-changes]
    if: needs.detect-changes.outputs.web-app == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel --token "$VERCEL_TOKEN" \
            ${{ needs.resolve-env.outputs.environment == 'prod' && '--prod' || '' }} \
            --yes

  notify:
    name: Slack Notification
    needs: [resolve-env, detect-changes, build-and-push, deploy, smoke-test]
    if: always() && needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.smoke-test.result }}" == "success" ]]; then
            echo "emoji=:white_check_mark:" >> "$GITHUB_OUTPUT"
            echo "text=succeeded" >> "$GITHUB_OUTPUT"
            echo "color=good" >> "$GITHUB_OUTPUT"
          else
            echo "emoji=:x:" >> "$GITHUB_OUTPUT"
            echo "text=failed" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
          fi

      - uses: slackapi/slack-github-action@v2
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.status.outputs.emoji }} Vaidyah deployment to *${{ needs.resolve-env.outputs.environment }}* ${{ steps.status.outputs.text }}\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Actor:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                      }
                    }
                  ]
                }
              ]
            }
