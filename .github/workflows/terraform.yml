name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-south-1
  TF_VERSION: "1.7.0"
  TF_WORKING_DIR: infra/terraform

jobs:
  detect-environments:
    name: Detect Environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.envs.outputs.environments }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: envs
        env:
          INPUT_ENV: ${{ github.event.inputs.environment }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Validate environment input against allowlist
            if [[ ! "$INPUT_ENV" =~ ^(dev|staging|prod)$ ]]; then
              echo "::error::Invalid environment: must be dev, staging, or prod"
              exit 1
            fi
            echo "environments=[\"${INPUT_ENV}\"]" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo 'environments=["dev"]' >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- infra/terraform/environments/ 2>/dev/null || echo "")
            ENVS=()
            for env in dev staging prod; do
              if echo "$CHANGED" | grep -q "environments/$env/" 2>/dev/null; then
                ENVS+=("\"$env\"")
              fi
            done
            if [[ ${#ENVS[@]} -eq 0 ]]; then
              ENVS=("\"dev\"" "\"staging\"" "\"prod\"")
            fi
            JOINED=$(IFS=,; echo "[${ENVS[*]}]")
            echo "environments=$JOINED" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (validate only)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: Plan (${{ matrix.environment }})
    needs: [detect-environments, validate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.detect-environments.outputs.environments) }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=infrastructure/${{ matrix.environment }}/terraform.tfstate"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${{ matrix.environment }}/terraform.tfvars" \
            -var="environment=${{ matrix.environment }}" \
            -out="${{ matrix.environment }}.tfplan" \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Generate plan summary
        id: summary
        if: always()
        run: |
          if [[ -f plan_output.txt ]]; then
            # Extract resource counts
            ADD=$(grep -oP '\d+(?= to add)' plan_output.txt || echo "0")
            CHANGE=$(grep -oP '\d+(?= to change)' plan_output.txt || echo "0")
            DESTROY=$(grep -oP '\d+(?= to destroy)' plan_output.txt || echo "0")
            echo "add=${ADD}" >> "$GITHUB_OUTPUT"
            echo "change=${CHANGE}" >> "$GITHUB_OUTPUT"
            echo "destroy=${DESTROY}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: |
            ${{ env.TF_WORKING_DIR }}/${{ matrix.environment }}.tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 1

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planFile = '${{ env.TF_WORKING_DIR }}/plan_output.txt';

            let plan = '';
            try {
              plan = fs.readFileSync(planFile, 'utf8');
            } catch (e) {
              plan = 'Plan output not available';
            }

            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const exitCode = '${{ steps.plan.outputs.exitcode }}';
            const statusEmoji = exitCode === '0' ? ':white_check_mark: No changes' : exitCode === '2' ? ':warning: Changes detected' : ':x: Error';

            const body = `### Terraform Plan: \`${{ matrix.environment }}\` ${statusEmoji}

            **Resources:** +${{ steps.summary.outputs.add || '0' }} ~${{ steps.summary.outputs.change || '0' }} -${{ steps.summary.outputs.destroy || '0' }}

            <details>
            <summary>Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Plan exit code: \`${exitCode}\`*
            *Pusher: @${{ github.actor }}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `### Terraform Plan: \`${{ matrix.environment }}\``;
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  apply:
    name: Apply (${{ matrix.environment }})
    needs: [detect-environments, plan]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    runs-on: ubuntu-latest
    environment:
      name: terraform-${{ matrix.environment }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        environment: ${{ fromJson(needs.detect-environments.outputs.environments) }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=infrastructure/${{ matrix.environment }}/terraform.tfstate"

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        id: apply
        run: |
          terraform apply \
            -no-color \
            "${{ matrix.environment }}.tfplan" 2>&1 | tee apply_output.txt

      - name: Post apply results
        if: always()
        run: |
          if [[ "${{ steps.apply.outcome }}" == "success" ]]; then
            echo "::notice::Terraform apply for ${{ matrix.environment }} completed successfully"
          else
            echo "::error::Terraform apply for ${{ matrix.environment }} failed"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tf-apply-${{ matrix.environment }}
          path: ${{ env.TF_WORKING_DIR }}/apply_output.txt
          retention-days: 7

  notify:
    name: Notify
    needs: [detect-environments, plan, apply]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.apply.result }}" == "success" || "${{ needs.apply.result }}" == "skipped" ]]; then
            if [[ "${{ needs.plan.result }}" == "success" ]]; then
              echo "text=Terraform pipeline completed successfully" >> "$GITHUB_OUTPUT"
              echo "color=good" >> "$GITHUB_OUTPUT"
            else
              echo "text=Terraform plan failed" >> "$GITHUB_OUTPUT"
              echo "color=danger" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "text=Terraform apply failed" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
          fi

      - uses: slackapi/slack-github-action@v2
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.status.outputs.text }}\n*Environments:* ${{ needs.detect-environments.outputs.environments }}\n*Actor:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                      }
                    }
                  ]
                }
              ]
            }
