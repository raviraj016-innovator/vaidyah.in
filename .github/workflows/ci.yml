name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npx turbo run lint

      - name: TypeScript type check
        run: npx turbo run typecheck

  lint-python:
    name: Lint & Typecheck Python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [voice-service, nlu-service, trial-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ matrix.service }}-${{ hashFiles(format('services/{0}/requirements*.txt', matrix.service)) }}
          restore-keys: |
            pip-lint-${{ matrix.service }}-

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy types-requests

      - name: Flake8 lint
        run: flake8 app/ --max-line-length=120 --extend-ignore=E203,W503 --statistics

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports --no-strict-optional --allow-untyped-defs
        continue-on-error: true

  test-node:
    name: Test Node.js Services
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vaidyah_test
          POSTGRES_USER: vaidyah
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaidyah"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://vaidyah:test_password@localhost:5432/vaidyah_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run unit tests (Jest)
        run: >-
          npx turbo run test
          --filter=@vaidyah/api-gateway
          --filter=@vaidyah/clinical-service
          --filter=@vaidyah/integration-service
          --filter=@vaidyah/shared-types
          --filter=@vaidyah/medical-ontology
          --filter=@vaidyah/telemedicine-service

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-coverage
          path: |
            services/*/coverage/
            packages/*/coverage/
          retention-days: 7

  test-python:
    name: Test Python Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [voice-service, nlu-service, trial-service]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vaidyah_test
          POSTGRES_USER: vaidyah
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaidyah"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.service }}-${{ hashFiles(format('services/{0}/requirements*.txt', matrix.service)) }}
          restore-keys: |
            pip-${{ matrix.service }}-

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run unit tests (pytest)
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -v
        env:
          DATABASE_URL: postgresql://vaidyah:test_password@localhost:5432/vaidyah_test
          AWS_REGION: ap-south-1
          AWS_DEFAULT_REGION: ap-south-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          retention-days: 7

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build all packages and apps
        run: npx turbo run build

  build-docker:
    name: Build Docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - clinical-service
          - integration-service
          - voice-service
          - nlu-service
          - trial-service
          - telemedicine-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve build context
        id: ctx
        run: |
          SVC="${{ matrix.service }}"
          echo "path=services/$SVC" >> "$GITHUB_OUTPUT"

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: false
          tags: vaidyah/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Python dependency safety check
        run: |
          pip install pip-audit
          for svc in voice-service nlu-service trial-service; do
            echo "::group::Auditing services/$svc"
            pip-audit -r "services/$svc/requirements.txt" --strict
            echo "::endgroup::"
          done

  container-security-scan:
    name: Container Security Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-docker
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - clinical-service
          - integration-service
          - voice-service
          - nlu-service
          - trial-service
          - telemedicine-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          load: true
          tags: vaidyah/${{ matrix.service }}:scan
          cache-from: type=gha,scope=${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vaidyah/${{ matrix.service }}:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-node, test-python, build-check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vaidyah_test
          POSTGRES_USER: vaidyah
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaidyah"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://vaidyah:test_password@localhost:5432/vaidyah_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run database migrations
        run: |
          PGPASSWORD=test_password psql -h localhost -U vaidyah -d vaidyah_test -f scripts/init.sql || true

      - name: Run integration tests
        run: npx turbo run test:integration --filter=@vaidyah/* || true

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, lint-python, test-node, test-python, build-check, security-scan]
    if: always()
    steps:
      - name: Check all CI jobs
        run: |
          RESULTS=("${{ needs.lint-and-typecheck.result }}" "${{ needs.lint-python.result }}" "${{ needs.test-node.result }}" "${{ needs.test-python.result }}" "${{ needs.build-check.result }}" "${{ needs.security-scan.result }}")
          for result in "${RESULTS[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::CI failed - one or more required jobs did not pass"
              exit 1
            fi
          done
          echo "All required CI jobs passed"
