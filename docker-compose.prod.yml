services:
  # ============ DATABASES ============
  redis:
    image: redis:7-alpine
    container_name: vaidyah-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ MEDIA SERVER ============
  livekit:
    image: livekit/livekit-server:latest
    container_name: vaidyah-livekit
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - "LIVEKIT_KEYS=API0ce04650060157bb: TSkOoXCZmkOtumFzOc94HNKNG+jUHcfOwChavwhOZIbV0Yzw"
    command: >
      --dev
      --bind 0.0.0.0
      --port 7880
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7880 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ============ BACKEND SERVICES ============
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: vaidyah-api-gateway
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=vaidyah-prod-postgres.c38oame2yz5i.ap-south-1.rds.amazonaws.com
      - DB_PORT=5432
      - DB_NAME=vaidyah
      - DB_USER=vaidyah_admin
      - DB_PASSWORD=9mj$$br7_f6yjtwUZaEoD](ywB!fuX<+x
      - DB_SSL=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=pjv6fJJAL3+3t+CWliaM/MecYOfOs2CiwQQ7PPyNqMLHYpR6WCcYAUfgyZZZQx6N
      - VOICE_SERVICE_URL=http://voice-service:8001
      - NLU_SERVICE_URL=http://nlu-service:8002
      - CLINICAL_SERVICE_URL=http://clinical-service:3001
      - TRIAL_SERVICE_URL=http://trial-service:8003
      - INTEGRATION_SERVICE_URL=http://integration-service:3002
      - TELEMEDICINE_SERVICE_URL=http://telemedicine-service:8004
      - AWS_REGION=ap-south-1
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  voice-service:
    build:
      context: ./services/voice-service
      dockerfile: Dockerfile
    container_name: vaidyah-voice-service
    ports:
      - "8001:8001"
    environment:
      - AWS_REGION=ap-south-1
      - S3_AUDIO_BUCKET=vaidyah-prod-voice-recordings
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nlu-service:
    build:
      context: ./services/nlu-service
      dockerfile: Dockerfile
    container_name: vaidyah-nlu-service
    ports:
      - "8002:8002"
    environment:
      - AWS_REGION=ap-south-1
      - BEDROCK_MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  clinical-service:
    build:
      context: ./services/clinical-service
      dockerfile: Dockerfile
    container_name: vaidyah-clinical-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://vaidyah_admin:9mj%24br7_f6yjtwUZaEoD%5D%28ywB%21fuX%3C%2Bx@vaidyah-prod-postgres.c38oame2yz5i.ap-south-1.rds.amazonaws.com:5432/vaidyah?sslmode=require
      - JWT_SECRET=pjv6fJJAL3+3t+CWliaM/MecYOfOs2CiwQQ7PPyNqMLHYpR6WCcYAUfgyZZZQx6N
      - NLU_SERVICE_URL=http://nlu-service:8002
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  trial-service:
    build:
      context: ./services/trial-service
      dockerfile: Dockerfile
    container_name: vaidyah-trial-service
    ports:
      - "8003:8003"
    environment:
      - AWS_REGION=ap-south-1
      - DATABASE_URL=postgresql://vaidyah_admin:9mj%24br7_f6yjtwUZaEoD%5D%28ywB%21fuX%3C%2Bx@vaidyah-prod-postgres.c38oame2yz5i.ap-south-1.rds.amazonaws.com:5432/vaidyah?sslmode=require
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  integration-service:
    build:
      context: ./services/integration-service
      dockerfile: Dockerfile
    container_name: vaidyah-integration-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DB_HOST=vaidyah-prod-postgres.c38oame2yz5i.ap-south-1.rds.amazonaws.com
      - DB_PORT=5432
      - DB_NAME=vaidyah
      - DB_USER=vaidyah_admin
      - DB_PASSWORD=9mj$$br7_f6yjtwUZaEoD](ywB!fuX<+x
      - DB_SSL=true
      - JWT_SECRET=pjv6fJJAL3+3t+CWliaM/MecYOfOs2CiwQQ7PPyNqMLHYpR6WCcYAUfgyZZZQx6N
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  telemedicine-service:
    build:
      context: ./services/telemedicine-service
      dockerfile: Dockerfile
    container_name: vaidyah-telemedicine-service
    ports:
      - "8004:8004"
    environment:
      - NODE_ENV=production
      - PORT=8004
      - AWS_REGION=ap-south-1
      - JWT_SECRET=pjv6fJJAL3+3t+CWliaM/MecYOfOs2CiwQQ7PPyNqMLHYpR6WCcYAUfgyZZZQx6N
      - CORS_ORIGINS=https://vaidyah.in,http://localhost:3000
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_WS_URL=ws://35.154.160.97:7880
      - LIVEKIT_API_KEY=API0ce04650060157bb
      - LIVEKIT_API_SECRET=TSkOoXCZmkOtumFzOc94HNKNG+jUHcfOwChavwhOZIbV0Yzw
    depends_on:
      - livekit
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
