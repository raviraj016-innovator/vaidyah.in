# =============================================================================
# Production Docker Compose — STANDALONE file (do NOT overlay with docker-compose.yml)
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# =============================================================================

services:
  # ============ CACHE ============
  redis:
    image: redis:7-alpine
    container_name: vaidyah-redis
    restart: unless-stopped
    # NOT exposed externally — internal Docker network only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ MEDIA SERVER ============
  livekit:
    image: livekit/livekit-server:latest
    container_name: vaidyah-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"       # HTTP / WebSocket
      - "7881:7881"       # RTC (TCP)
      - "7882:7882/udp"   # RTC (UDP)
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command: --bind 0.0.0.0 --port 7880
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7880 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ============ API GATEWAY (only externally exposed backend port) ============
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: vaidyah-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Database (RDS)
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-vaidyah}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: "true"
      # Redis (internal, no TLS — local Docker network)
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_TLS: "false"
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      # CORS — Vercel rewrites are server-side so browser never hits this directly,
      # but WebSocket and direct calls need it
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Internal service URLs (Docker network names)
      VOICE_SERVICE_URL: http://voice-service:8001
      NLU_SERVICE_URL: http://nlu-service:8002
      CLINICAL_SERVICE_URL: http://clinical-service:3001
      TRIAL_SERVICE_URL: http://trial-service:8003
      INTEGRATION_SERVICE_URL: http://integration-service:3002
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:8004
      # AWS
      AWS_REGION: ap-south-1
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============ VOICE SERVICE (Python — has curl, NOT wget) ============
  voice-service:
    build:
      context: ./services/voice-service
      dockerfile: Dockerfile
    container_name: vaidyah-voice-service
    restart: unless-stopped
    # No ports exposed — only reachable via api-gateway
    environment:
      ENVIRONMENT: production
      AWS_REGION: ap-south-1
      S3_AUDIO_BUCKET: ${S3_AUDIO_BUCKET:-vaidyah-prod-voice-recordings}
      JWT_SECRET_KEY: ${JWT_SECRET}
      AUTH_ENABLED: "true"
      CORS_ORIGINS: '["https://vaidyah.in","https://vaidyah.vercel.app"]'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============ NLU SERVICE (Python — has curl, NOT wget) ============
  nlu-service:
    build:
      context: ./services/nlu-service
      dockerfile: Dockerfile
    container_name: vaidyah-nlu-service
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      AWS_REGION: ap-south-1
      BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
      JWT_SECRET_KEY: ${JWT_SECRET}
      AUTH_ENABLED: "true"
      CORS_ORIGINS: '["https://vaidyah.in","https://vaidyah.vercel.app"]'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============ CLINICAL SERVICE (Node — has wget via Alpine) ============
  clinical-service:
    build:
      context: ./services/clinical-service
      dockerfile: Dockerfile
    container_name: vaidyah-clinical-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Node pg needs uselibpqcompat for RDS SSL
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD_URL}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME:-vaidyah}?uselibpqcompat=true&sslmode=require"
      JWT_SECRET: ${JWT_SECRET}
      NLU_SERVICE_URL: http://nlu-service:8002
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ============ TRIAL SERVICE (Python — has curl, NOT wget) ============
  trial-service:
    build:
      context: ./services/trial-service
      dockerfile: Dockerfile
    container_name: vaidyah-trial-service
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      AWS_REGION: ap-south-1
      # asyncpg needs plain sslmode, no uselibpqcompat
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD_URL}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME:-vaidyah}?sslmode=require"
      JWT_SECRET_KEY: ${JWT_SECRET}
      CORS_ORIGINS: '["https://vaidyah.in","https://vaidyah.vercel.app"]'
    volumes:
      - ./clinical-trials.csv:/data/clinical-trials.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============ INTEGRATION SERVICE (Node — has curl installed) ============
  integration-service:
    build:
      context: ./services/integration-service
      dockerfile: Dockerfile
    container_name: vaidyah-integration-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-vaidyah}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: "true"
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============ TELEMEDICINE SERVICE (Node — has wget via Alpine) ============
  telemedicine-service:
    build:
      context: ./services/telemedicine-service
      dockerfile: Dockerfile
    container_name: vaidyah-telemedicine-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8004"
      AWS_REGION: ap-south-1
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LIVEKIT_URL: http://livekit:7880
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    depends_on:
      - livekit
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  redis_data:
