services:
  # ============ DATABASES ============
  postgres:
    image: postgres:16-alpine
    container_name: vaidyah-postgres
    environment:
      POSTGRES_DB: vaidyah
      POSTGRES_USER: vaidyah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/rls-policies.sql:/docker-entrypoint-initdb.d/02-rls-policies.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaidyah"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaidyah-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ MEDIA SERVER ============
  livekit:
    image: livekit/livekit-server:latest
    container_name: vaidyah-livekit
    ports:
      - "7880:7880"   # HTTP / WebSocket
      - "7881:7881"   # RTC (TCP)
      - "7882:7882/udp" # RTC (UDP)
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}"
    command: >
      --dev
      --bind 0.0.0.0
      --port 7880
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7880 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ============ BACKEND SERVICES ============
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: vaidyah-api-gateway
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vaidyah
      - DB_USER=vaidyah
      - DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DB_SSL=${DB_SSL:-false}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - VOICE_SERVICE_URL=http://voice-service:8001
      - NLU_SERVICE_URL=http://nlu-service:8002
      - CLINICAL_SERVICE_URL=http://clinical-service:3001
      - TRIAL_SERVICE_URL=http://trial-service:8003
      - INTEGRATION_SERVICE_URL=http://integration-service:3002
      - TELEMEDICINE_SERVICE_URL=http://telemedicine-service:8004
      # AWS services (configure for production; dev uses local fallbacks)
      - AWS_REGION=ap-south-1
      # - KMS_KEY_ID=
      # - AWS_SECRETS_PREFIX=vaidyah
      # - SNS_TOPIC_ARN_PREFIX=
      # - CLOUDWATCH_NAMESPACE=Vaidyah
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/api-gateway/src:/app/src
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  voice-service:
    build:
      context: ./services/voice-service
      dockerfile: Dockerfile
    container_name: vaidyah-voice-service
    ports:
      - "8001:8001"
    environment:
      - AWS_REGION=ap-south-1
      - S3_AUDIO_BUCKET=vaidyah-voice-recordings
      - JWT_SECRET_KEY=${JWT_SECRET:?JWT_SECRET is required}
    volumes:
      - ./services/voice-service/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nlu-service:
    build:
      context: ./services/nlu-service
      dockerfile: Dockerfile
    container_name: vaidyah-nlu-service
    ports:
      - "8002:8002"
    environment:
      - AWS_REGION=ap-south-1
      - BEDROCK_MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0
      - JWT_SECRET_KEY=${JWT_SECRET:?JWT_SECRET is required}
    volumes:
      - ./services/nlu-service/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  clinical-service:
    build:
      context: ./services/clinical-service
      dockerfile: Dockerfile
    container_name: vaidyah-clinical-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://vaidyah:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/vaidyah?sslmode=${DB_SSL_MODE:-prefer}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - NLU_SERVICE_URL=http://nlu-service:8002
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/clinical-service/src:/app/src
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  trial-service:
    build:
      context: ./services/trial-service
      dockerfile: Dockerfile
    container_name: vaidyah-trial-service
    ports:
      - "8003:8003"
    environment:
      - AWS_REGION=ap-south-1
      - DATABASE_URL=postgresql://vaidyah:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/vaidyah
      - JWT_SECRET_KEY=${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/trial-service/app:/app/app
      - ./clinical-trials.csv:/data/clinical-trials.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  integration-service:
    build:
      context: ./services/integration-service
      dockerfile: Dockerfile
    container_name: vaidyah-integration-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vaidyah
      - DB_USER=vaidyah
      - DB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DB_SSL=${DB_SSL:-false}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/integration-service/src:/app/src
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  telemedicine-service:
    build:
      context: ./services/telemedicine-service
      dockerfile: Dockerfile
    container_name: vaidyah-telemedicine-service
    ports:
      - "8004:8004"
    environment:
      - NODE_ENV=development
      - PORT=8004
      - AWS_REGION=ap-south-1
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3001,http://localhost:5173}
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_WS_URL=${LIVEKIT_WS_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
    depends_on:
      - livekit
    volumes:
      - ./services/telemedicine-service/src:/app/src
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
